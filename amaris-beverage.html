<style>
  :root{
    --bg:#ECE4D1; --bg-warm:#E8DEC8; --card:#EFE8D7;
    --ink:#5A4A39; --ink-soft:#6E5D49; --muted:#8C7B61;
    --gold:#AC8A56; --gold-deep:#9A7842; --eyebrow:#A68C66;
    --line:#CBBB99; --line-soft:#D9CCAD; --maxw:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink-soft);font-family:'Lora',Georgia,serif;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
  .stroke{stroke:var(--ink);fill:none;stroke-width:1;vector-effect:non-scaling-stroke}

  /* language toggle */
  .lang-toggle{position:fixed;top:18px;right:18px;z-index:60;display:flex;align-items:center;
    background:rgba(239,232,215,.82);backdrop-filter:blur(8px);border:1px solid var(--line);
    border-radius:40px;padding:4px;box-shadow:0 6px 22px rgba(90,74,57,.10)}
  .lang-toggle button{font-family:'Poppins',sans-serif;font-size:11px;letter-spacing:.18em;border:none;background:none;
    color:var(--muted);padding:7px 15px;border-radius:30px;cursor:pointer;transition:color .35s ease, background .45s ease}
  .lang-toggle button.active{background:var(--ink);color:#F2EBDA}
  .lang-toggle button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* cover */
  .cover{position:relative;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px 90px}
  .frame{position:absolute;inset:16px;border:1px solid var(--line);pointer-events:none}
  .corner{position:absolute;width:120px;height:120px;opacity:0;animation:fadeIn 1.4s ease .2s forwards}
  .corner.tl{top:8px;left:8px}
  .corner.tr{top:8px;right:8px;transform:scaleX(-1)}
  .cover-eyebrow{font-family:'Poppins',sans-serif;font-weight:300;font-size:12px;letter-spacing:.42em;color:var(--eyebrow);text-transform:uppercase;margin-bottom:38px;opacity:0;animation:rise 1s ease .35s forwards}
  .wordmark{margin-bottom:8px}
  .wordmark .amaris{font-family:'Poppins',sans-serif;font-weight:300;font-size:clamp(52px,11vw,118px);letter-spacing:.12em;color:var(--ink);line-height:1;display:flex;justify-content:center}
  .wordmark .amaris span{opacity:0;transform:translateY(18px);animation:rise .9s cubic-bezier(.2,.7,.2,1) forwards}
  .wordmark .beach{font-family:'Poppins',sans-serif;font-weight:300;font-size:clamp(18px,3.4vw,30px);letter-spacing:.62em;color:var(--ink);margin-top:14px;padding-left:.62em;opacity:0;animation:rise 1s ease .9s forwards}
  .cover-divider{display:flex;align-items:center;gap:16px;margin:46px 0 24px;opacity:0;animation:fadeIn 1s ease 1.1s forwards}
  .cover-divider .ln{width:62px;height:1px;background:var(--line)}
  .menu-label{font-family:'Poppins',sans-serif;font-weight:300;font-size:clamp(15px,2.6vw,20px);letter-spacing:.46em;color:var(--ink);text-transform:uppercase;padding-left:.46em;opacity:0;animation:rise 1s ease 1.2s forwards}
  .palm{margin:30px auto 0;opacity:0;animation:fadeIn 1.6s ease 1.4s forwards}
  .palm path{stroke-dasharray:240;stroke-dashoffset:240;animation:draw 2.4s ease 1.5s forwards}
  .cover-foot{position:absolute;bottom:54px;left:0;right:0;font-family:'Poppins',sans-serif;font-weight:300;font-size:12px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase;opacity:0;animation:fadeIn 1.2s ease 1.6s forwards;padding:0 24px}
  .waves{position:absolute;left:0;right:0;bottom:0;width:100%;height:40px;opacity:.55}

  /* nav */
  .navbar{position:sticky;top:0;z-index:50;background:rgba(236,228,209,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-soft)}
  .navbar .inner{max-width:var(--maxw);margin:0 auto;display:flex;gap:6px;overflow-x:auto;padding:11px 20px;scrollbar-width:none}
  .navbar .inner::-webkit-scrollbar{display:none}
  .navbar a{flex:0 0 auto;font-family:'Poppins',sans-serif;font-weight:400;font-size:11px;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;color:var(--muted);padding:7px 14px;border-radius:30px;white-space:nowrap;transition:color .3s, background .3s}
  .navbar a:hover{color:var(--ink)}
  .navbar a.active{color:#F2EBDA;background:var(--gold)}

  /* sections */
  #menu{transition:opacity .28s ease, filter .28s ease}
  #menu.swapping{opacity:0;filter:blur(3px)}
  .section{padding:78px 0 16px}
  .section-head{text-align:center;margin-bottom:50px}
  .sec-eyebrow{font-family:'Poppins',sans-serif;font-weight:300;font-size:12px;letter-spacing:.4em;color:var(--eyebrow);text-transform:uppercase;display:block;margin-bottom:14px}
  .sec-title{font-family:'Lora',serif;font-weight:500;font-size:clamp(30px,5.2vw,46px);color:var(--ink);letter-spacing:.01em}
  .sec-orn{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px}
  .sec-orn .ln{width:50px;height:1px;background:var(--line)}
  .sec-orn svg{opacity:.85}
  .sec-legend{font-family:'Poppins',sans-serif;font-weight:300;font-size:11px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-top:16px}

  .groups{column-count:2;column-gap:64px}
  @media(max-width:760px){.groups{column-count:1}}
  .group{break-inside:avoid;margin-bottom:42px;display:inline-block;width:100%}
  .group-head{font-family:'Poppins',sans-serif;font-weight:400;font-size:13px;letter-spacing:.26em;color:var(--gold-deep);text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .group-head::after{content:"";flex:1;height:1px;background:var(--line-soft)}
  .group-note{font-family:'Poppins',sans-serif;font-weight:300;font-size:10.5px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;text-align:right;margin-bottom:16px}
  .group-note.spacer{margin-bottom:18px}

  .item{margin-bottom:15px;opacity:0;transform:translateY(16px)}
  .item.visible{opacity:1;transform:none;transition:opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1)}
  .item-top{display:flex;align-items:baseline;gap:8px}
  .item-name{font-family:'Lora',serif;font-weight:500;font-size:17px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .leader{flex:1;border-bottom:1px dotted var(--line);transform:translateY(-4px);min-width:14px;transition:border-color .4s}
  .item:hover .leader{border-color:var(--gold)}
  .item-price{font-family:'Lora',serif;font-weight:500;font-size:15.5px;color:var(--gold);white-space:nowrap;letter-spacing:.02em}
  .item-desc{font-family:'Lora',serif;font-style:italic;font-weight:400;font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.45;max-width:46ch}
  .item-desc.origin{letter-spacing:.04em}

  .divider{width:100%;height:30px;margin:8px 0;opacity:.4}

  footer{text-align:center;padding:64px 24px 90px;position:relative}
  .foot-palm{opacity:.7;margin-bottom:22px}
  .foot-line{font-family:'Lora',serif;font-style:italic;font-size:16px;color:var(--ink)}
  .foot-note{font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--muted);margin-top:14px}
  .foot-meta{font-family:'Poppins',sans-serif;font-weight:300;font-size:11px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase;margin-top:22px}

  @keyframes rise{to{opacity:1;transform:none}}
  @keyframes fadeIn{to{opacity:1}}
  @keyframes draw{to{stroke-dashoffset:0}}

  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
    .item{opacity:1;transform:none}
    .palm path{stroke-dashoffset:0}
    .corner,.cover-eyebrow,.wordmark span,.wordmark .beach,.cover-divider,.menu-label,.palm,.cover-foot{opacity:1;transform:none}
    html{scroll-behavior:auto}
  }
</style>
</head>

/* ---------------- render ---------------- */
let LANG = "en";
function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

function buildNav(){
  const nav = document.getElementById("nav"); nav.innerHTML="";
  M.forEach(s=>{ const a=el("a",null,s.nav[LANG]); a.href="#"+s.id; a.dataset.target=s.id; nav.appendChild(a); });
}

function buildMenu(animate){
  const main = document.getElementById("menu"); main.innerHTML="";
  M.forEach((s, si)=>{
    const sec = el("section","section"); sec.id=s.id;
    const head = el("div","section-head");
    head.appendChild(el("span","sec-eyebrow", s.eyebrow[LANG]));
    head.appendChild(el("h2","sec-title", s.title[LANG]));
    const orn = el("div","sec-orn");
    orn.innerHTML = '<span class="ln"></span>'+(ICON[s.icon]||'')+'<span class="ln"></span>';
    head.appendChild(orn);
    sec.appendChild(head);

    const wrap = el("div","groups");
    s.groups.forEach(g=>{
      const gr = el("div","group");
      gr.appendChild(el("div","group-head", g.head[LANG]));
      if(g.note) gr.appendChild(el("div","group-note", g.note[LANG]));
      g.items.forEach(it=>{
        const item = el("div","item"+(animate?"":" visible"));
        const top = el("div","item-top");
        top.appendChild(el("span","item-name", it.n[LANG]));
        top.appendChild(el("span","leader"));
        top.appendChild(el("span","item-price", it.p));
        item.appendChild(top);
        if(it.d) item.appendChild(el("div","item-desc"+(it.dc?" origin":""), it.d[LANG]));
        gr.appendChild(item);
      });
      wrap.appendChild(gr);
    });
    sec.appendChild(wrap);

    if(si < M.length-1){
      const div = document.createElementNS("http://www.w3.org/2000/svg","svg");
      div.setAttribute("class","divider"); div.setAttribute("viewBox","0 0 1200 30"); div.setAttribute("preserveAspectRatio","none");
      div.innerHTML='<path class="stroke" d="M0 15 Q 60 4 120 15 T 240 15 T 360 15 T 480 15 T 600 15 T 720 15 T 840 15 T 960 15 T 1080 15 T 1200 15"/>';
      sec.appendChild(div);
    }
    main.appendChild(sec);
  });
  if(animate) observeItems();
}

let io;
function observeItems(){
  if(io) io.disconnect();
  io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        [...e.target.querySelectorAll(".item:not(.visible)")].forEach((it,i)=>setTimeout(()=>it.classList.add("visible"), i*45));
        io.unobserve(e.target);
      }
    });
  }, {threshold:.1, rootMargin:"0px 0px -6% 0px"});
  document.querySelectorAll(".group").forEach(g=>io.observe(g));
}

function setupNavSpy(){
  const links = [...document.querySelectorAll(".navbar a")];
  const spy = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting) links.forEach(l=>l.classList.toggle("active", l.dataset.target===e.target.id)); });
  }, {rootMargin:"-45% 0px -50% 0px"});
  document.querySelectorAll(".section").forEach(s=>spy.observe(s));
}

function applyUI(){
  document.querySelectorAll("[data-i]").forEach(node=>{
    const k=node.getAttribute("data-i"); if(UI[k]) node.textContent=UI[k][LANG];
  });
  document.documentElement.lang=LANG; document.documentElement.dataset.lang=LANG;
}

function setLang(lang){
  if(lang===LANG) return;
  LANG=lang;
  document.getElementById("btn-en").classList.toggle("active", lang==="en");
  document.getElementById("btn-tr").classList.toggle("active", lang==="tr");
  applyUI(); buildNav(); setupNavSpy();
  const main=document.getElementById("menu");
  main.classList.add("swapping");
  setTimeout(()=>{ buildMenu(false); main.classList.remove("swapping"); }, 240);
}

applyUI(); buildNav(); buildMenu(true); setupNavSpy();
